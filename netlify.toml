[build]
  publish = "."

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/eventos/ramos-palm-sunday-festival/"
  to = "/ramos/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
